name: Deploy (Cloudflare Pages)

# Builds the Vite SPA and publishes it to Cloudflare Pages on every push to main.
#
# One-time setup — add two repo secrets under
# Settings -> Secrets and variables -> Actions -> New repository secret:
#   CLOUDFLARE_API_TOKEN   token scoped to "Cloudflare Pages -> Edit" on the sponsor account
#   CLOUDFLARE_ACCOUNT_ID  the sponsor account id
# The first deploy creates the "drumbeat-viewer" Pages project; confirm its Production branch
# is "main" (CF dashboard -> the project -> Settings -> Builds & deployments), or change
# --branch below.

on:
  push:
    branches: [main]
  workflow_dispatch: {}          # allow manual runs from the Actions tab

concurrency:
  group: pages-deploy
  cancel-in-progress: true       # a newer push supersedes an in-flight deploy

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # wrangler.jsonc supplies the project name + output dir (dist); --branch=main
        # makes this a production deployment.
        run: npx wrangler pages deploy --branch=main
